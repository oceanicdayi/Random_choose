<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#741616">
<title>搖搖抽籤桶</title>
<style>
:root{--x:0px;--r:0deg;--sx:0px;--sr:0deg}*{box-sizing:border-box}html,body{margin:0;min-height:100%;overflow-x:hidden;font-family:system-ui,-apple-system,"Noto Sans TC",sans-serif;color:#fff6de;background:radial-gradient(circle at 50% 17%,#9d3f2a 0,#5d1313 35%,#260909 100%);touch-action:manipulation;user-select:none}body{min-height:100svh;display:grid;place-items:center}.app{width:min(100%,560px);min-height:100svh;padding:max(18px,env(safe-area-inset-top)) 18px max(18px,env(safe-area-inset-bottom));display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden}.app:before,.app:after{content:"";position:absolute;width:230px;height:230px;border:1px solid #ffd99722;border-radius:50%;pointer-events:none}.app:before{left:-140px;top:110px}.app:after{right:-140px;bottom:100px}h1{margin:4px 0 3px;font-size:clamp(29px,8vw,42px);letter-spacing:.09em;text-shadow:0 4px 13px #0008}.sub{margin:0 0 12px;color:#ffdca2;text-align:center;font-size:14px}.status{min-height:27px;padding:5px 13px;border-radius:99px;background:#fff1;color:#ffe4ad;font-size:13px;backdrop-filter:blur(6px)}.stage{width:100%;flex:1;min-height:425px;position:relative;display:flex;align-items:flex-end;justify-content:center;padding-bottom:20px;perspective:900px}.shadow{position:absolute;bottom:22px;width:235px;height:35px;border-radius:50%;background:#0006;filter:blur(10px)}.bucket{width:280px;height:370px;position:relative;transform-origin:50% 90%;transform:translateX(var(--x)) rotate(var(--r));will-change:transform}.bucket.auto{animation:bucketShake .15s linear infinite}@keyframes bucketShake{0%{transform:translateX(-10px) rotate(-4deg)}25%{transform:translateX(9px) rotate(3deg)}50%{transform:translateX(-6px) rotate(-2deg)}75%{transform:translateX(10px) rotate(4deg)}100%{transform:translateX(-10px) rotate(-4deg)}}.rim{position:absolute;left:30px;bottom:224px;width:220px;height:72px;border-radius:50%;background:linear-gradient(#54200c,#a9511e 43%,#351005 73%);box-shadow:inset 0 10px 13px #ffd07a33,0 9px 14px #0006;z-index:1}.opening{position:absolute;left:43px;bottom:235px;width:194px;height:50px;border-radius:50%;background:radial-gradient(ellipse,#180702,#2c0c03 58%,#7c3412);box-shadow:inset 0 7px 14px #000b;z-index:2}.sticks{position:absolute;left:0;right:0;bottom:13px;height:225px;z-index:3;transform:translateX(var(--sx)) rotate(var(--sr));will-change:transform}.sticks.auto{animation:stickShake .11s linear infinite alternate}@keyframes stickShake{from{transform:translateX(-7px) rotate(-3deg)}to{transform:translateX(7px) rotate(3deg)}}.stick{--left:50%;--rot:0deg;position:absolute;left:var(--left);bottom:0;width:15px;height:210px;border-radius:8px 8px 5px 5px;transform-origin:50% 100%;transform:translateX(-50%) rotate(var(--rot));background:linear-gradient(90deg,#a95720,#edae5c 25%,#ffe0a0 48%,#ca762d 76%,#76320f);border:1px solid #5a210766;box-shadow:1px 3px 5px #0004}.stick:before{content:attr(data-mark);position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:14px;font-weight:900;color:#8d1212}.body{position:absolute;left:48px;bottom:18px;width:184px;height:238px;z-index:5;clip-path:polygon(8% 0,92% 0,78% 100%,22% 100%);border-radius:18px 18px 48px 48px;background:linear-gradient(90deg,#5b190a,#a83e17 20%,#da7028 47%,#85260f 75%,#461205);box-shadow:inset 18px 0 22px #ffc06f18,inset -16px 0 20px #21000044,0 18px 20px #0006}.body:before,.body:after{content:"";position:absolute;left:14%;width:72%;height:12px;border-radius:99px;background:linear-gradient(#e9a54b,#6a290c);box-shadow:0 3px 4px #0005}.body:before{top:20px}.body:after{bottom:25px}.emblem{position:absolute;left:50%;top:68px;width:92px;height:92px;transform:translateX(-50%);border-radius:50%;display:grid;place-items:center;color:#6b0f0f;background:radial-gradient(circle,#ffe9ae,#e6a446 70%,#81320e);border:5px double #6d1d07;box-shadow:0 4px 10px #0006;font-size:40px;font-weight:900}.front{position:absolute;left:30px;bottom:229px;width:220px;height:61px;border-radius:0 0 50% 50%;border-bottom:15px solid #843411;z-index:6}.fly{position:absolute;left:50%;bottom:248px;width:18px;height:230px;z-index:20;border-radius:9px;background:linear-gradient(90deg,#a94f1b,#f2bb6c 27%,#ffe2a7 48%,#ca7429 77%,#783510);border:1px solid #55200580;box-shadow:0 7px 14px #0007;transform-origin:50% 100%;opacity:0}.fly:before{content:"籤";position:absolute;top:12px;left:50%;transform:translateX(-50%);color:#8d1212;font-size:18px;font-weight:900}.fly.go{animation:fly 1.2s cubic-bezier(.2,.78,.24,1) forwards}@keyframes fly{0%{opacity:0;transform:translate(-50%,22px) rotate(0) scale(.9)}15%{opacity:1}70%{opacity:1;transform:translate(-50%,-220px) rotate(13deg)}100%{opacity:1;transform:translate(-50%,-188px) rotate(8deg) scale(1.04)}}.result{width:min(92%,390px);margin:2px auto 13px;padding:14px 16px;text-align:center;border:1px solid #ffdc9d55;border-radius:18px;background:#460808bd;box-shadow:0 12px 25px #0004;backdrop-filter:blur(8px);transform:translateY(8px);opacity:0;transition:.35s}.result.show{transform:none;opacity:1}.label{font-size:12px;color:#ffd58b;letter-spacing:.18em}.text{margin-top:4px;font-size:clamp(21px,6vw,29px);font-weight:900}.controls{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:10px}button{min-height:49px;border:0;border-radius:15px;font-size:16px;font-weight:900;cursor:pointer;color:#671010;background:linear-gradient(#ffe7ad,#efb85b);box-shadow:0 6px 0 #853d15,0 10px 16px #0005}button:active{transform:translateY(4px);box-shadow:0 2px 0 #853d15}button.alt{color:#ffeac0;background:#fff1;border:1px solid #ffe1a455;box-shadow:none}.hint{margin:13px 0 0;color:#ffefd0bd;font-size:12px;line-height:1.55;text-align:center}@media(max-height:740px){.stage{min-height:355px}.bucket{scale:.86;margin-bottom:-23px}.result{margin-top:-2px}}
</style>
</head>
<body>
<main class="app">
<h1>搖搖抽籤桶</h1>
<p class="sub">拿穩手機，搖幾下，看看今天抽到什麼籤。</p>
<div class="status" id="status">尚未啟用搖晃感測</div>
<section class="stage" aria-label="抽籤桶動畫">
<div class="shadow" id="shadow"></div>
<div class="bucket" id="bucket">
<div class="rim"></div><div class="opening"><div class="sticks" id="sticks"></div></div>
<div class="body"><div class="emblem">籤</div></div><div class="front"></div><div class="fly" id="fly"></div>
</div>
</section>
<section class="result" id="result" aria-live="polite"><div class="label">本次抽籤結果</div><div class="text" id="resultText">尚未抽籤</div></section>
<div class="controls"><button id="enable">啟用手機搖晃</button><button class="alt" id="simulate">模擬搖晃</button></div>
<p class="hint">iPhone／iPad 請先按「啟用手機搖晃」，並允許動作與方向取用。<br>請使用 HTTPS 網址開啟，讓手機感測器正常運作。</p>
</main>
<script>
(()=>{const bucket=document.querySelector('#bucket'),sticks=document.querySelector('#sticks'),shadow=document.querySelector('#shadow'),status=document.querySelector('#status'),enable=document.querySelector('#enable'),simulate=document.querySelector('#simulate'),fly=document.querySelector('#fly'),result=document.querySelector('#result'),resultText=document.querySelector('#resultText');const fortunes=['大吉：今天適合勇敢行動','中吉：穩定前進會有收穫','小吉：留意身邊的小機會','吉：貴人將在意想不到之處出現','平：保持耐心，答案會逐漸清楚','學業籤：專注一件事，成果會更好','工作籤：先完成最重要的任務','人際籤：主動說一句溫暖的話','創意籤：把第一個想法做成小作品','行動籤：今天就開始，不必等完美'];let enabled=false,drawing=false,last=0,energy=0,timer,lastA={x:0,y:0,z:0},ready=false;for(let i=0;i<25;i++){const s=document.createElement('div');s.className='stick';s.style.setProperty('--left',18+Math.random()*64+'%');s.style.setProperty('--rot',-15+Math.random()*30+'deg');s.style.height=188+Math.random()*42+'px';s.dataset.mark=i%4?'籤':'吉';sticks.appendChild(s)}const say=t=>status.textContent=t;const buzz=p=>navigator.vibrate&&navigator.vibrate(p);function visual(dx,r,sx,sr){document.documentElement.style.setProperty('--x',dx+'px');document.documentElement.style.setProperty('--r',r+'deg');document.documentElement.style.setProperty('--sx',sx+'px');document.documentElement.style.setProperty('--sr',sr+'deg');shadow.style.transform='scaleX('+(1-Math.min(Math.abs(r)/40,.16))+')'}function relax(){visual(0,0,0,0)}function hit(v){if(drawing)return;const n=performance.now();if(n-last<75)return;last=n;energy+=Math.min(v,45);say('感應到搖晃，繼續搖！');clearTimeout(timer);timer=setTimeout(()=>{relax();energy=Math.max(0,energy-25)},180);if(energy>=120){energy=0;draw()}}function draw(){if(drawing)return;drawing=true;say('籤正在掉出來…');result.classList.remove('show');fly.classList.remove('go');void fly.offsetWidth;bucket.classList.add('auto');sticks.classList.add('auto');buzz([35,35,35]);setTimeout(()=>{bucket.classList.remove('auto');sticks.classList.remove('auto');fly.classList.add('go');buzz(80)},850);setTimeout(()=>{resultText.textContent=fortunes[Math.floor(Math.random()*fortunes.length)];result.classList.add('show');say('抽籤完成，再搖一次可重新抽籤');buzz([45,55,110])},1750);setTimeout(()=>drawing=false,2400)}function motion(e){if(!enabled||drawing)return;const a=e.accelerationIncludingGravity||e.acceleration;if(!a)return;const x=+a.x||0,y=+a.y||0,z=+a.z||0;if(!ready){lastA={x,y,z};ready=true;return}const dx=x-lastA.x,dy=y-lastA.y,dz=z-lastA.z;lastA={x,y,z};const d=Math.sqrt(dx*dx+dy*dy+dz*dz);visual(Math.max(-18,Math.min(18,dx*1.8)),Math.max(-6.5,Math.min(6.5,dx*.55)),Math.max(-12,Math.min(12,-dx*1.4)),Math.max(-5,Math.min(5,-dx*.45)));if(d>9.5)hit(d)}async function start(){try{if(typeof DeviceMotionEvent==='undefined'){say('此裝置不支援感測器，可使用模擬搖晃');return}if(typeof DeviceMotionEvent.requestPermission==='function'&&await DeviceMotionEvent.requestPermission()!=='granted'){say('未取得搖晃權限，可使用模擬搖晃');return}window.addEventListener('devicemotion',motion,{passive:true});enabled=true;enable.textContent='手機搖晃已啟用';enable.disabled=true;say('搖晃感測已啟用，請開始搖手機');buzz(50)}catch(err){console.error(err);say('無法啟用感測器，請使用模擬搖晃')}}function demo(){if(drawing)return;let n=0;bucket.classList.add('auto');sticks.classList.add('auto');say('模擬搖晃中…');const id=setInterval(()=>{n++;buzz(18);if(n>=6){clearInterval(id);bucket.classList.remove('auto');sticks.classList.remove('auto');draw()}},130)}enable.onclick=start;simulate.onclick=demo;document.addEventListener('visibilitychange',()=>document.hidden&&relax())})();
</script>
</body>
</html>
